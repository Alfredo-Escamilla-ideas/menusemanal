async function importar() {
  const btn = document.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Importando…';
  const log = document.getElementById('log');
  log.textContent = '';

  await new Promise(r => setTimeout(r, 1000)); // wait for firebase init
  const user = firebase.auth().currentUser;
  if (!user) { log.textContent = 'ERROR: Debes iniciar sesión primero.'; btn.disabled = false; return; }

  const db = firebase.firestore();
  const coll = db.collection('users').doc(user.uid).collection('ingredientes');

  // Get existing names to avoid duplicates
  const existing = await coll.get();
  const existingNames = new Set(existing.docs.map(d => d.data().name?.toLowerCase()));

  let added = 0, skipped = 0, errors = 0;

  for (const ing of INGREDIENTS) {
    try {
      if (existingNames.has(ing.name.toLowerCase())) {
        log.textContent += `⏭️  Ya existe: ${ing.name}\n`;
        skipped++;
      } else {
        await coll.add({ ...ing, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        log.textContent += `✅ Añadido: ${ing.name}\n`;
        added++;
        existingNames.add(ing.name.toLowerCase());
      }
      log.scrollTop = log.scrollHeight;
    } catch(e) {
      log.textContent += `❌ Error: ${ing.name} — ${e.message}\n`;
      errors++;
    }
    await new Promise(r => setTimeout(r, 50));
  }

  log.textContent += `\n📊 Resultado: ${added} añadidos, ${skipped} ya existían, ${errors} errores.\n`;
  log.textContent += '✅ Importación completada. Puedes cerrar esta página.\n';
  btn.textContent = 'Importar ingredientes';
  btn.disabled = false;
}
