<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Platos | Planificador de Comidas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="utils.js?v=3"></script>
    <script src="perfil.js"></script>
    <link rel="stylesheet" href="gestion-platos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: ['class', '.theme-dark'],
            corePlugins: { preflight: false },
            theme: { extend: { colors: { brand: { DEFAULT: '#c2410c', hover: '#9a3412', light: '#fb923c' } } } }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #hamburgerMenu { display: none; }
        #hamburgerMenu.open { display: block; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 flex items-center h-14 px-4 bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 shadow-sm">
        <div class="flex items-center gap-1 shrink-0">
            <button class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors mode-light" onclick="setThemeMode('light')" title="Modo claro">☀️</button>
            <button class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors mode-dark" onclick="setThemeMode('dark')" title="Modo oscuro">🌙</button>
        </div>
        <div class="flex-1 flex justify-center">
            <span class="font-bold text-[#c2410c] dark:text-[#fb923c] text-base tracking-tight select-none">Gestor de Menús</span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <a class="hidden md:inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors whitespace-nowrap" href="menu.html">⬅ Menú</a>
            <a class="hidden md:inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors whitespace-nowrap" href="ingredientes.html">🧂 Ingredientes</a>
            <div id="authWidget" class="auth-widget"></div>
            <button class="md:hidden p-2 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors leading-none" id="hamburgerBtn" onclick="toggleHamburger()">☰</button>
        </div>
    </nav>
    <div id="hamburgerMenu" class="fixed top-14 right-0 z-40 w-56 bg-white dark:bg-gray-950 border border-gray-200 dark:border-gray-800 border-t-0 rounded-bl-xl shadow-xl">
        <div class="p-2 border-b border-gray-100 dark:border-gray-800">
            <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors mode-light" onclick="setThemeMode('light');closeHamburger()">☀️ Modo claro</button>
            <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors mode-dark" onclick="setThemeMode('dark');closeHamburger()">🌙 Modo oscuro</button>
        </div>
        <div class="p-2">
            <a class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" href="menu.html">⬅ Menú Semanal</a>
            <a class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" href="ingredientes.html">🧂 Ingredientes</a>
        </div>
    </div>

    <div class="container">
        <div class="plates-list-header">
            <h2>🍽️ Mis Platos</h2>
            <button class="btn-new-plate" onclick="openAddModal()">+ Nuevo plato</button>
        </div>
        <div class="plates-search-wrapper">
            <input type="text" id="platesSearchInput" class="plates-search-input" placeholder="🔎 Buscar plato, alérgeno o etiqueta..." autocomplete="off" spellcheck="false">
        </div>
        <div id="platesList"></div>
    </div>

    <!-- ====== MODAL: Añadir / Editar alimento ====== -->
    <div id="plateModal" class="custom-modal">
        <div class="custom-modal-content plate-form-modal">

            <!-- Panel 1: Selección de tipo -->
            <div id="typeSelectPanel">
                <div class="plate-modal-header">
                    <h3>¿Qué tipo de plato es?</h3>
                    <button class="custom-modal-close" onclick="closePlateModal()">×</button>
                </div>
                <div class="grid grid-cols-2 gap-3 p-5">
                    <button class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 hover:border-[#c2410c] dark:hover:border-[#fb923c] hover:-translate-y-1 hover:shadow-md transition-all text-center" onclick="selectType('primeros')">
                        <span class="text-4xl">🥣</span>
                        <span class="font-semibold text-sm text-gray-800 dark:text-gray-100">Primero</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">Sopa, ensalada, pasta…</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 hover:border-[#c2410c] dark:hover:border-[#fb923c] hover:-translate-y-1 hover:shadow-md transition-all text-center" onclick="selectType('segundos')">
                        <span class="text-4xl">🍗</span>
                        <span class="font-semibold text-sm text-gray-800 dark:text-gray-100">Segundo</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">Carne, pescado, huevos…</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 hover:border-[#c2410c] dark:hover:border-[#fb923c] hover:-translate-y-1 hover:shadow-md transition-all text-center" onclick="selectType('postres')">
                        <span class="text-4xl">🍰</span>
                        <span class="font-semibold text-sm text-gray-800 dark:text-gray-100">Postre</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">Fruta, lácteo, dulce…</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 hover:border-[#c2410c] dark:hover:border-[#fb923c] hover:-translate-y-1 hover:shadow-md transition-all text-center" onclick="selectType('unico')">
                        <span class="text-4xl">🥘</span>
                        <span class="font-semibold text-sm text-gray-800 dark:text-gray-100">Plato Único</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">Guisos, asados, fast food…</span>
                    </button>
                    <button class="col-span-2 flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 hover:border-[#c2410c] dark:hover:border-[#fb923c] hover:-translate-y-1 hover:shadow-md transition-all text-center" onclick="selectType('guarnicion')">
                        <span class="text-4xl">🥗</span>
                        <span class="font-semibold text-sm text-gray-800 dark:text-gray-100">Guarnición</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">Arroz, patatas, ensaladas…</span>
                    </button>
                </div>
            </div>

            <!-- Panel 2: Formulario de detalle -->
            <div id="detailPanel" class="hidden">
                <div class="plate-modal-header">
                    <div class="header-back-title">
                        <button type="button" class="btn-back" id="backBtn" onclick="goBackToTypeSelect()">Cambiar categoría</button>
                        <h3 id="plateModalTitle">Nuevo Primero</h3>
                    </div>
                    <button class="custom-modal-close" onclick="closePlateModal()">×</button>
                </div>
                <div class="plate-modal-body">

                    <div class="field-group">
                        <label class="field-label">NOMBRE *</label>
                        <div class="input-with-action">
                            <input type="text" id="pmName" placeholder="Ej: Pechuga de pollo" autocomplete="off">
                            <button type="button" class="search-recipe-btn" onclick="searchInDirectoAlPaladar()" title="Buscar receta en DirectoAlPaladar">🔍</button>
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label">TIPO ESPECÍFICO</label>
                        <div id="subcatChips" class="subcat-chips-row"></div>
                    </div>

                    <div class="field-row-2">
                        <div class="field-group">
                            <label class="field-label">UNIDAD</label>
                            <select id="pmUnit">
                                <option value="">—</option>
                                <option value="kg">kg</option>
                                <option value="g">g</option>
                                <option value="l">l</option>
                                <option value="ml">ml</option>
                                <option value="unidad">unidad</option>
                                <option value="racion">ración</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label class="field-label">TEMPORADA</label>
                            <select id="pmSeason">
                                <option value="todo">Todo el año</option>
                                <option value="primavera">Primavera</option>
                                <option value="verano">Verano</option>
                                <option value="otono">Otoño</option>
                                <option value="invierno">Invierno</option>
                            </select>
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label">ALÉRGENOS (14 UE)</label>
                        <div class="allergens-grid">
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="gluten"> Gluten</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="crustaceos"> Crustáceos</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="huevos"> Huevos</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="pescado"> Pescado</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="cacahuetes"> Cacahuetes</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="soja"> Soja</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="lacteos"> Lácteos</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="frutos_secos"> Frutos secos</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="apio"> Apio</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="mostaza"> Mostaza</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="sesamo"> Sésamo</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="sulfitos"> Sulfitos</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="moluscos"> Moluscos</label>
                            <label class="check-label"><input type="checkbox" name="pmAllergen" value="altramuz"> Altramuz</label>
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label">USO PREFERENTE</label>
                        <div class="checks-row">
                            <label class="check-label"><input type="checkbox" id="pmUseComida"> 🍽️ Comida</label>
                            <label class="check-label"><input type="checkbox" id="pmUseCena"> 🌙 Cena</label>
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label">ETIQUETAS DIETÉTICAS</label>
                        <div class="checks-row">
                            <label class="check-label"><input type="checkbox" id="pmVegetariano"> 🥗 Vegetariano</label>
                            <label class="check-label"><input type="checkbox" id="pmVegano"> 🌱 Vegano</label>
                            <label class="check-label"><input type="checkbox" id="pmSinGluten"> Sin gluten</label>
                            <label class="check-label"><input type="checkbox" id="pmSinLactosa"> Sin lactosa</label>
                        </div>
                    </div>

                </div>
                <div class="plate-modal-footer">
                    <button class="btn-cancel" onclick="closePlateModal()">Cancelar</button>
                    <button class="btn-save" onclick="savePlate()">Guardar</button>
                </div>
            </div>

        </div>
    </div>

    <!-- ====== MODAL: Confirmar ====== -->
    <div id="confirmModal" class="custom-modal">
        <div class="custom-modal-content confirm-content">
            <div class="custom-modal-header">
                <h3 id="confirmTitle">Confirmar acción</h3>
                <button class="custom-modal-close" onclick="resolveConfirm(false)">×</button>
            </div>
            <div class="custom-modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="custom-modal-footer">
                <button class="btn-secondary" onclick="resolveConfirm(false)">Cancelar</button>
                <button class="btn-danger" onclick="resolveConfirm(true)">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="gestion-platos.js"></script>
</body>
</html>
