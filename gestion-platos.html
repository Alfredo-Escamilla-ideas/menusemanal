<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Platos | Planificador de Comidas</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="gestion-platos.css">
</head>
<body>
    <nav class="topbar">
        <div class="topbar-left">
            <button class="theme-toggle-btn mode-light" onclick="setThemeMode('light')" title="Modo claro">☀️</button>
            <button class="theme-toggle-btn mode-dark" onclick="setThemeMode('dark')" title="Modo oscuro">🌙</button>
        </div>
        <div class="topbar-center">🍽️ Gestión de Platos</div>
        <div class="topbar-right">
            <button class="topbar-nav-btn" onclick="window.location.href='menu.html'">⬅ Volver al Menú</button>
            <div id="authWidget" class="auth-widget"></div>
        </div>
    </nav>

    <div class="container">
        <!-- Formulario para añadir platos -->
        <div class="add-form">
            <h2>➕ Añadir Nuevo Plato</h2>
            <div class="form-group">
                <label for="plateName">Nombre del Plato *</label>
                <div class="input-with-action">
                    <input type="text" id="plateName" placeholder="Ej: Paella valenciana">
                </div>
            </div>
            <div class="form-group">
                <label>Categorías *</label>
                <div class="categories-selector">
                    <div class="category-option" data-category="primeros">
                        <input type="checkbox" id="cat-primeros" name="category" value="primeros">
                        <label for="cat-primeros">🥗 Primeros Platos</label>
                    </div>
                    <div class="category-option" data-category="segundos">
                        <input type="checkbox" id="cat-segundos" name="category" value="segundos">
                        <label for="cat-segundos">🍗 Segundos Platos</label>
                    </div>
                    <div class="category-option" data-category="postres">
                        <input type="checkbox" id="cat-postres" name="category" value="postres">
                        <label for="cat-postres">🍮 Postres</label>
                    </div>
                    <div class="category-option" data-category="cenas">
                        <input type="checkbox" id="cat-cenas" name="category" value="cenas">
                        <label for="cat-cenas">🌙 Cenas Ligeras</label>
                    </div>
                    <div class="category-option" data-category="unico">
                        <input type="checkbox" id="cat-unico" name="category" value="unico">
                        <label for="cat-unico">🍲 Plato Único</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="plateComments">💬 Comentarios</label>
                <textarea id="plateComments" placeholder="Añade ingredientes, instrucciones, notas..."></textarea>
            </div>
            <div class="form-group">
                <label for="plateLink">🔗 Link de Receta</label>
                <input type="url" id="plateLink" placeholder="https://ejemplo.com/receta">
            </div>
            <button class="add-button" onclick="addPlate()">Añadir Plato</button>
        </div>

        <!-- Lista de platos -->
        <div class="plates-list">
            <h2>📋 Mis Platos</h2>
            <div class="plates-search-wrapper">
                <input type="text" id="platesSearchInput" class="plates-search-input" placeholder="🔎 Buscar plato, comentario o enlace..." autocomplete="off" spellcheck="false">
            </div>
            <div id="platesList">
                <!-- Se llenará dinámicamente -->
            </div>
        </div>
    </div>

    <div id="editPlateModal" class="custom-modal">
        <div class="custom-modal-content">
            <div class="custom-modal-header">
                <h3>✏️ Editar Plato</h3>
                <button class="custom-modal-close" onclick="closeEditModal()">×</button>
            </div>
            <div class="custom-modal-body">
                <div class="form-group">
                    <label for="editPlateName">Nombre del Plato *</label>
                    <div class="input-with-action">
                        <input type="text" id="editPlateName" placeholder="Nombre del plato">
                        <button type="button" class="search-recipe-btn" onclick="searchInDirectoAlPaladar('edit')" title="Buscar receta en DirectoAlPaladar">🔍 Buscar receta</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Categorías *</label>
                    <div class="categories-selector" id="editCategoriesSelector">
                        <div class="category-option" data-category="primeros">
                            <input type="checkbox" id="edit-cat-primeros" name="editCategory" value="primeros">
                            <label for="edit-cat-primeros">🥗 Primeros Platos</label>
                        </div>
                        <div class="category-option" data-category="segundos">
                            <input type="checkbox" id="edit-cat-segundos" name="editCategory" value="segundos">
                            <label for="edit-cat-segundos">🍗 Segundos Platos</label>
                        </div>
                        <div class="category-option" data-category="postres">
                            <input type="checkbox" id="edit-cat-postres" name="editCategory" value="postres">
                            <label for="edit-cat-postres">🍮 Postres</label>
                        </div>
                        <div class="category-option" data-category="cenas">
                            <input type="checkbox" id="edit-cat-cenas" name="editCategory" value="cenas">
                            <label for="edit-cat-cenas">🌙 Cenas Ligeras</label>
                        </div>
                        <div class="category-option" data-category="unico">
                            <input type="checkbox" id="edit-cat-unico" name="editCategory" value="unico">
                            <label for="edit-cat-unico">🍲 Plato Único</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editPlateComments">💬 Comentarios (opcional)</label>
                    <textarea id="editPlateComments" placeholder="Añade ingredientes, instrucciones, notas..."></textarea>
                </div>
                <div class="form-group">
                    <label for="editPlateLink">🔗 Link de Receta (opcional)</label>
                    <input type="url" id="editPlateLink" placeholder="https://ejemplo.com/receta">
                </div>
            </div>
            <div class="custom-modal-footer">
                <button class="btn-secondary" onclick="closeEditModal()">Cancelar</button>
                <button class="btn-primary" onclick="savePlateEdit()">Guardar cambios</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="custom-modal">
        <div class="custom-modal-content confirm-content">
            <div class="custom-modal-header">
                <h3 id="confirmTitle">Confirmar acción</h3>
                <button class="custom-modal-close" onclick="resolveConfirm(false)">×</button>
            </div>
            <div class="custom-modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="custom-modal-footer">
                <button class="btn-secondary" onclick="resolveConfirm(false)">Cancelar</button>
                <button class="btn-danger" onclick="resolveConfirm(true)">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="gestion-platos.js"></script>
</body>
</html>
