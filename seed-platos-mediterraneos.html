// ─── Helpers ─────────────────────────────────────────────────────────────────
const log = document.getElementById('log');
function print(msg, cls='') {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ─── Auth callback ────────────────────────────────────────────────────────────
function onAuthReady(user) {
  if (!user) {
    print('⚠️  Debes iniciar sesión primero. Ve a menu.html, inicia sesión y vuelve aquí.', 'err');
    document.getElementById('btnRun').disabled = true;
  } else {
    print(`Sesión activa: ${user.email}`, 'ok');
  }
}

// ─── Seed principal ───────────────────────────────────────────────────────────
async function runSeed() {
  document.getElementById('btnRun').disabled = true;
  log.innerHTML = '';

  try {
    // ── 1. Ingredientes ───────────────────────────────────────────────────
    print('── INGREDIENTES ─────────────────────────────', 'hd');
    const ingRef = db.collection('users').doc(currentUser.uid).collection('ingredientes');
    const existSnap = await ingRef.get();
    const existNames = new Set(existSnap.docs.map(d => (d.data().name || '').toLowerCase().trim()));

    let ingAdded = 0, ingSkipped = 0;
    for (const ing of INGREDIENTES) {
      const key = ing.name.toLowerCase().trim();
      if (existNames.has(key)) {
        print(`  · omitido (ya existe): ${ing.name}`, 'skip');
        ingSkipped++;
      } else {
        await ingRef.add({ ...ing });
        print(`  + añadido: ${ing.name}`, 'ok');
        existNames.add(key);
        ingAdded++;
      }
    }
    print(`Ingredientes: ${ingAdded} añadidos, ${ingSkipped} ya existían.\n`, 'ok');

    // ── 2. Platos ─────────────────────────────────────────────────────────
    print('── PLATOS ───────────────────────────────────', 'hd');
    const foodsRef = db.collection('users').doc(currentUser.uid)
                       .collection('foods').doc('custom-foods');
    const foodsSnap = await foodsRef.get();
    const data = foodsSnap.exists ? foodsSnap.data() : {};
    const customFoods = data.customFoods || {};

    let platosAdded = 0, platosSkipped = 0;
    for (const plato of PLATOS) {
      const cat = plato.categoria;
      if (!customFoods[cat]) customFoods[cat] = [];

      const existsInCat = customFoods[cat].some(p => {
        const n = typeof p === 'string' ? p : (p.name || '');
        return n.toLowerCase().trim() === plato.name.toLowerCase().trim();
      });

      if (existsInCat) {
        print(`  · omitido (ya existe en ${cat}): ${plato.name}`, 'skip');
        platosSkipped++;
      } else {
        customFoods[cat].push({ name: plato.name, description: plato.description });
        print(`  + añadido [${cat}]: ${plato.name}`, 'ok');
        platosAdded++;
      }
    }

    await foodsRef.set({ customFoods });
    // Invalidar caché local para que menu.html recargue los platos
    localStorage.removeItem('customFoods');
    print(`Platos: ${platosAdded} añadidos, ${platosSkipped} ya existían.\n`, 'ok');

    print('✅  Seed completado. Puedes cerrar esta página.', 'ok');
  } catch (err) {
    print(`ERROR: ${err.message}`, 'err');
    console.error(err);
    document.getElementById('btnRun').disabled = false;
  }
}
