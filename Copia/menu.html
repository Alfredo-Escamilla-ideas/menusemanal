<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Semanal | Planificador de Comidas</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    
    <link rel="stylesheet" href="../menu.css">
</head>
<body>
    <div class="header">
        <h1>🍴 Menú Semanal 🍴</h1>
    </div>

    <!-- Modal para seleccionar comidas en móvil -->
    <div id="foodModal" class="food-modal">
        <div class="food-modal-content">
            <div class="modal-header">
                <span id="modalTitle">Selecciona una comida</span>
                <button class="modal-tab-close" onclick="closeFoodModal()" aria-label="Cerrar selector de platos">×</button>
            </div>
            <div class="modal-body">
                <div class="modal-fixed-zone">
                    <input type="text" id="modalSearchInput" class="modal-search" placeholder="🔎 Buscar plato..." autocomplete="off" spellcheck="false">
                    <div class="modal-fixed-row">
                        <div id="modalFixedCategoryTitle" class="modal-fixed-category-title"></div>
                        <button id="modalClearSlotBtn" class="modal-clear-slot-btn" type="button" onclick="clearCurrentSlotFromModal()" aria-label="Borrar casilla">🗑️</button>
                    </div>
                </div>
                <div id="modalFoods"></div>
            </div>
        </div>
    </div>

    <div id="customConfirmModal" class="food-modal">
        <div class="food-modal-content confirm-modal-content">
            <div class="modal-header" id="customConfirmTitle">Confirmar acción</div>
            <div class="modal-body">
                <p id="customConfirmMessage" class="confirm-message"></p>
            </div>
            <div class="confirm-actions">
                <button class="modal-close secondary" onclick="resolveCustomConfirm(false)">Cancelar</button>
                <button class="modal-close" onclick="resolveCustomConfirm(true)">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="table-container">
            <div class="calendar-action-buttons" style="justify-content: center; margin-bottom: 16px;">
                <button class="copy-btn" id="applyCopyBtn" onclick="applyCopyToOfficial()" title="Aplicar copia al calendario oficial" style="display: inline-flex;">✅ Aplicar</button>
            </div>

            <div class="calendar-navigation">
                <div class="calendar-nav-left">
                    <button class="nav-arrow" onclick="prevCalendar()" id="prevBtn">‹</button>
                    <span class="current-calendar-label" id="calendarLabel">Calendario 1</span>
                    <button class="nav-arrow" onclick="nextCalendar()" id="nextBtn">›</button>
                </div>
                <div class="calendar-indicators" id="calendarIndicators">
                    <div class="calendar-indicator active" onclick="goToCalendar(1)">1</div>
                    <div class="calendar-indicator" onclick="goToCalendar(2)">2</div>
                    <div class="calendar-indicator" onclick="goToCalendar(3)">3</div>
                    <div class="calendar-indicator" onclick="goToCalendar(4)">4</div>
                </div>
            </div>

            <!-- Vista de una semana -->
            <div class="single-week-view">
                <table id="weekTable">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Lunes</th>
                            <th>Martes</th>
                            <th>Miércoles</th>
                            <th>Jueves</th>
                            <th>Viernes</th>
                            <th>Sábado</th>
                            <th>Domingo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="day-header"><span class="emoji">🍽️</span><span class="text"> Primero</span></td>
                            <td><div class="meal-slot" data-day="lunes" data-meal="comida1"></div></td>
                            <td><div class="meal-slot" data-day="martes" data-meal="comida1"></div></td>
                            <td><div class="meal-slot" data-day="miercoles" data-meal="comida1"></div></td>
                            <td><div class="meal-slot" data-day="jueves" data-meal="comida1"></div></td>
                            <td><div class="meal-slot" data-day="viernes" data-meal="comida1"></div></td>
                            <td><div class="meal-slot" data-day="sabado" data-meal="comida1"></div></td>
                            <td><div class="meal-slot" data-day="domingo" data-meal="comida1"></div></td>
                        </tr>
                        <tr>
                            <td class="day-header"><span class="emoji">🍽️</span><span class="text"> Segundo</span></td>
                            <td><div class="meal-slot" data-day="lunes" data-meal="comida2"></div></td>
                            <td><div class="meal-slot" data-day="martes" data-meal="comida2"></div></td>
                            <td><div class="meal-slot" data-day="miercoles" data-meal="comida2"></div></td>
                            <td><div class="meal-slot" data-day="jueves" data-meal="comida2"></div></td>
                            <td><div class="meal-slot" data-day="viernes" data-meal="comida2"></div></td>
                            <td><div class="meal-slot" data-day="sabado" data-meal="comida2"></div></td>
                            <td><div class="meal-slot" data-day="domingo" data-meal="comida2"></div></td>
                        </tr>
                        <tr>
                            <td class="day-header"><span class="emoji">🍮</span><span class="text"> Postre</span></td>
                            <td><div class="meal-slot" data-day="lunes" data-meal="postre"></div></td>
                            <td><div class="meal-slot" data-day="martes" data-meal="postre"></div></td>
                            <td><div class="meal-slot" data-day="miercoles" data-meal="postre"></div></td>
                            <td><div class="meal-slot" data-day="jueves" data-meal="postre"></div></td>
                            <td><div class="meal-slot" data-day="viernes" data-meal="postre"></div></td>
                            <td><div class="meal-slot" data-day="sabado" data-meal="postre"></div></td>
                            <td><div class="meal-slot" data-day="domingo" data-meal="postre"></div></td>
                        </tr>
                        <tr>
                            <td class="day-header"><span class="emoji">🌙</span><span class="text"> Primero</span></td>
                            <td><div class="meal-slot" data-day="lunes" data-meal="cena1"></div></td>
                            <td><div class="meal-slot" data-day="martes" data-meal="cena1"></div></td>
                            <td><div class="meal-slot" data-day="miercoles" data-meal="cena1"></div></td>
                            <td><div class="meal-slot" data-day="jueves" data-meal="cena1"></div></td>
                            <td><div class="meal-slot" data-day="viernes" data-meal="cena1"></div></td>
                            <td><div class="meal-slot" data-day="sabado" data-meal="cena1"></div></td>
                            <td><div class="meal-slot" data-day="domingo" data-meal="cena1"></div></td>
                        </tr>
                        <tr>
                            <td class="day-header"><span class="emoji">🌙</span><span class="text"> Segundo</span></td>
                            <td><div class="meal-slot" data-day="lunes" data-meal="cena2"></div></td>
                            <td><div class="meal-slot" data-day="martes" data-meal="cena2"></div></td>
                            <td><div class="meal-slot" data-day="miercoles" data-meal="cena2"></div></td>
                            <td><div class="meal-slot" data-day="jueves" data-meal="cena2"></div></td>
                            <td><div class="meal-slot" data-day="viernes" data-meal="cena2"></div></td>
                            <td><div class="meal-slot" data-day="sabado" data-meal="cena2"></div></td>
                            <td><div class="meal-slot" data-day="domingo" data-meal="cena2"></div></td>
                        </tr>
                        <tr>
                            <td class="day-header"><span class="emoji">🍮</span><span class="text"> Postre</span></td>
                            <td><div class="meal-slot" data-day="lunes" data-meal="cenaPostre"></div></td>
                            <td><div class="meal-slot" data-day="martes" data-meal="cenaPostre"></div></td>
                            <td><div class="meal-slot" data-day="miercoles" data-meal="cenaPostre"></div></td>
                            <td><div class="meal-slot" data-day="jueves" data-meal="cenaPostre"></div></td>
                            <td><div class="meal-slot" data-day="viernes" data-meal="cenaPostre"></div></td>
                            <td><div class="meal-slot" data-day="sabado" data-meal="cenaPostre"></div></td>
                            <td><div class="meal-slot" data-day="domingo" data-meal="cenaPostre"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="../menu.js"></script>
</body>
</html>
