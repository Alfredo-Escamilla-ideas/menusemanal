<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | Menú Semanal</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- ===== LOGIN SCREEN ===== -->
    <div id="loginScreen" class="screen">
        <div class="login-card">
            <div style="font-size:2.8em; margin-bottom:16px;">🔐</div>
            <h1>Panel de Administración</h1>
            <p class="subtitle">Solo accesible para el administrador</p>
            <button class="google-login-btn" id="googleLoginBtn" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Iniciar sesión con Google
            </button>
        </div>
    </div>

    <!-- ===== DENIED SCREEN ===== -->
    <div id="deniedScreen" class="screen hidden">
        <div class="login-card denied">
            <span class="denied-icon">⛔</span>
            <h1>Acceso denegado</h1>
            <p class="subtitle">La cuenta <strong id="deniedUserName"></strong> no tiene permisos de administrador.</p>
            <button class="logout-btn-secondary" onclick="logout()">Cerrar sesión y volver</button>
        </div>
    </div>

    <!-- ===== ADMIN PANEL ===== -->
    <div id="adminPanel" class="screen hidden" style="align-items: stretch; justify-content: flex-start; padding: 0;">

        <!-- Header -->
        <div class="admin-header">
            <div class="admin-header-left">
                <button class="theme-toggle-btn mode-light" onclick="setThemeMode('light')" title="Modo claro">☀️</button>
                <button class="theme-toggle-btn mode-dark" onclick="setThemeMode('dark')" title="Modo oscuro">🌙</button>
            </div>
            <div class="admin-header-title">⚙️ Panel de Administración</div>
            <div class="admin-header-user">
                <img id="adminAvatar" class="admin-avatar" src="" alt="Avatar">
                <span id="adminName" class="admin-user-name"></span>
                <button class="admin-nav-btn" onclick="window.location.href='menu.html'">🍴 Menú Semanal</button>
                <button class="admin-logout-btn" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>

        <!-- Content -->
        <div class="container">

            <!-- Card: Añadir Editor -->
            <div class="card">
                <h2>➕ Añadir Editor</h2>
                <div class="input-row">
                    <input type="email" id="newEditorEmail" placeholder="correo@gmail.com" autocomplete="off" spellcheck="false"
                        onkeydown="if(event.key==='Enter') addEditor()">
                    <button class="btn-primary" onclick="addEditor()">Añadir</button>
                </div>
            </div>

            <!-- Card: Lista de Editores -->
            <div class="card">
                <h2>📋 Editores Actuales</h2>
                <div id="editorsList">
                    <div class="editors-empty">Cargando editores...</div>
                </div>
            </div>

        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
